name: rafta
description: "Rafta — Kisisel Kutuphane Yoneticisi"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  # State management
  provider: ^6.1.0
  # Database
  sqflite: ^2.4.2
  path: ^1.9.1
  # Network
  http: ^1.2.0
  # Barcode scanning
  mobile_scanner: ^6.0.0
  # OCR
  google_mlkit_text_recognition: ^0.14.0
  # Images
  cached_network_image: ^3.4.0
  image_picker: ^1.1.0
  # Utils
  uuid: ^4.5.0
  shared_preferences: ^2.3.0
  google_fonts: ^6.2.0
  intl: ^0.20.2
  sqflite_common_ffi_web: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.0

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/meb-logo-icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/meb-logo-icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
