name: kutuphane_mobile
description: "Kutuphane Yonetim Sistemi Mobile App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  mobile_scanner: ^6.0.0
  google_mlkit_text_recognition: ^0.14.0
  http: ^1.2.0
  uuid: ^4.5.0
  provider: ^6.1.0
  cached_network_image: ^3.4.0
  image_picker: ^1.1.0
  shared_preferences: ^2.3.0
  file_picker: ^8.0.0
  excel: ^4.0.0
  google_fonts: ^6.2.0
  flutter_native_splash: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.0

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/meb-logo-icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/meb-logo-icon.png"

flutter_native_splash:
  color: "#FFFFFF"
  image: "assets/images/meb-logo-icon.png"
  android: true
  ios: false
  android_12:
    color: "#FFFFFF"
    icon_background_color: "#FFFFFF"
    image: "assets/images/meb-logo-icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/mock-data/
    - assets/images/
